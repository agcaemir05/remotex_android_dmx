name: RemoteX
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  permission_handler: ^11.3.1
  flutter_blue_plus: ^1.34.5
  get: ^4.7.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.2
  noise_meter: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.10.0
  flutter_lints: ^5.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/fiberli-icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/fiberli-logo.jpg
    - assets/icons/fiberli-icon.png